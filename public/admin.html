<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Admin</title></head>
<body>
<h1>Admin - Products</h1>
<form id="addForm">
  <input name="name" placeholder="Product Name">
  <input name="code" placeholder="Product Code">
  <button type="submit">Add</button>
</form>
<ul id="list"></ul>
<script>
async function load(){
  const res=await fetch('/products');
  const products=await res.json();
  const ul=document.getElementById('list');
  ul.innerHTML='';
  products.forEach(p=>{
    const li=document.createElement('li');
    li.textContent=p.name+' ('+p.code+')';
    const del=document.createElement('button');
    del.textContent='Delete';
    del.onclick=async()=>{
      await fetch('/deleteProduct',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'id='+p.id});
      load();
    };
    li.appendChild(del);
    ul.appendChild(li);
  });
}
load();

document.getElementById('addForm').onsubmit=async(e)=>{
  e.preventDefault();
  const f=new FormData(e.target);
  const params=new URLSearchParams();
  for(const [k,v] of f.entries()) params.append(k,v);
  await fetch('/addProduct',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:params});
  e.target.reset();
  load();
};
</script>
</body>
</html>
